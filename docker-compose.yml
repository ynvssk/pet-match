services:
  postgres:
    image: postgres:16-alpine
    container_name: petmate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: petmate
      POSTGRES_PASSWORD: petmate
      POSTGRES_DB: petmate
    ports:
      - "5432:5432"
    volumes:
      - petmate-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petmate -d petmate"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  petmate-pgdata:
